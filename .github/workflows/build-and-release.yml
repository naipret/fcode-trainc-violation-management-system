name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up GCC/MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make

    - name: Build Project
      shell: msys2 {0}
      run: |
        mingw32-make clean
        mingw32-make

    - name: Build Seed Data Tool
      shell: msys2 {0}
      run: |
        gcc -std=c17 -m64 -Wall -Iinclude tools/seed_data.c -o bin/seed_data.exe

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcode-violation-management-windows
        path: |
          bin/violation-management-system.exe
          bin/seed_data.exe
          README.md

  release:
    needs: build-windows
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: fcode-violation-management-windows
        path: release-binaries

    - name: Zip Release
      run: |
        cd release-binaries
        zip -r ../fcode-violation-management-system-win64.zip .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: fcode-violation-management-system-win64.zip
        body_path: .github/release-template.md
        tag_name: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
        name: "Release ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}"
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
